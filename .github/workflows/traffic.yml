name: Save GitHub Traffic Data Daily

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  run-traffic-collector:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Fetch, Merge, and Clean Traffic Data
        env:
          GH_TOKEN: ${{ secrets.TRAFFIC_TOKEN }}
        run: |
          mkdir -p traffic
          
          # Fetch the latest rolling 14-day data from GitHub for both views and clones
          gh api repos/${{ github.repository }}/traffic/views > new_views.json
          gh api repos/${{ github.repository }}/traffic/clones > new_clones.json
          
          # Run python to cleanly merge and format both metrics
          python3 -c "
          import json, os

          def merge_traffic_data(file_path, new_data_file, data_key):
              existing_data = {'count': 0, 'uniques': 0, data_key: []}
              if os.path.exists(file_path):
                  with open(file_path, 'r') as f:
                      existing_data = json.load(f)
              
              with open(new_data_file, 'r') as f:
                  new_data = json.load(f)
              
              # Merge arrays based on unique timestamps
              merged = {item['timestamp']: item for item in existing_data.get(data_key, [])}
              for item in new_data.get(data_key, []):
                  merged[item['timestamp']] = item
              
              sorted_items = sorted(merged.values(), key=lambda x: x['timestamp'])
              total_count = sum(item['count'] for item in sorted_items)
              total_uniques = sum(item['uniques'] for item in sorted_items)
              
              output = {'count': total_count, 'uniques': total_uniques, data_key: sorted_items}
              
              with open(file_path, 'w') as f:
                  json.dump(output, f, indent=2)

          # Process both files seamlessly
          merge_traffic_data('traffic/raw_views.json', 'new_views.json', 'views')
          merge_traffic_data('traffic/raw_clones.json', 'new_clones.json', 'clones')
          "
          
          # Push both clean files back to your repository
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@://github.com"
          git add traffic/raw_views.json traffic/raw_clones.json
          git commit -m "Clean and update daily traffic and clone logs [skip ci]" || echo "No changes"
          git push
